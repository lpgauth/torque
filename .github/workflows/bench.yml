name: Benchmark

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  deployments: write

env:
  MIX_ENV: bench
  TORQUE_BUILD: true

jobs:
  benchmark:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: bench-mix-${{ hashFiles('mix.lock') }}
          restore-keys: bench-mix-

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v0-bench
          shared-key: x86_64-unknown-linux-gnu

      - name: Install dependencies
        run: mix deps.get

      - name: Fix simdjsone Makefile priv dir bug
        run: sed -i 's|$(BASEDIR)/priv|$(PRIV_DIR)|g' deps/simdjsone/c_src/Makefile

      - name: Compile
        run: mix compile

      - name: Run benchmarks
        run: mix run bench/torque_bench.exs
        env:
          BENCH_OUTPUT: json

      - name: Store trend data
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Torque Benchmarks
          tool: customBiggerIsBetter
          output-file-path: bench_torque.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          benchmark-data-dir-path: dev/bench
          comment-on-alert: true
          alert-threshold: "130%"
          fail-on-alert: false

      - name: Deploy comparison data and custom page
        run: |
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages -B gh-pages origin/gh-pages
          mkdir -p /tmp/gh-pages/dev/bench
          cp bench_comparison.json /tmp/gh-pages/dev/bench/comparison.json
          cp bench/index.html /tmp/gh-pages/dev/bench/index.html
          cd /tmp/gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dev/bench/comparison.json dev/bench/index.html
          if ! git diff --staged --quiet; then
            git commit -m "Update comparison data and benchmark page"
            git push origin gh-pages
          fi

      - name: Upload raw results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            bench_torque.json
            bench_comparison.json
          retention-days: 90
